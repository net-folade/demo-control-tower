name: pipeline-monthly

on:
  schedule:
    # 07:00 UTC on the 2nd of every month (gives source data time to publish)
    - cron: "0 7 2 * *"
  workflow_dispatch:

concurrency:
  group: pipeline-monthly
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      COMTRADE_KEY: ${{ secrets.COMTRADE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      # Wired up in Slice 1 / 2
      # - run: python tools/fetch_pink_sheet.py
      # - run: python tools/fetch_comtrade_monthly.py
      - run: echo "no monthly jobs registered yet"
