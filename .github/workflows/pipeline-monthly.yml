name: pipeline-monthly

on:
  schedule:
    # 07:00 UTC on the 2nd of every month (gives source data time to publish)
    - cron: "0 7 2 * *"
  workflow_dispatch:

concurrency:
  group: pipeline-monthly
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      COMTRADE_KEY: ${{ secrets.COMTRADE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Refresh commodity prices (World Bank Pink Sheet)
        run: python tools/fetch_pink_sheet.py

      - name: Refresh Ghana trade flows (UN Comtrade)
        run: python tools/fetch_comtrade_monthly.py

      # GPHA annual port stats are loaded manually from the checked-in CSV.
      # GPHA publishes once per year, so a monthly cron would be wasted minutes.
      # Re-run `python tools/load_gpha_port_stats.py` when a new bulletin lands.
