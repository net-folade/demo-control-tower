name: pipeline-hourly

on:
  schedule:
    # Top of every hour
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: pipeline-hourly
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      AISSTREAM_KEY: ${{ secrets.AISSTREAM_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      # Wired up in Slice 3
      # - run: python tools/snapshot_ais_vessels.py
      # - run: python tools/derive_port_events.py
      - run: echo "no hourly jobs registered yet"
