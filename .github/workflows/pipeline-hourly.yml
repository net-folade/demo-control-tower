name: pipeline-hourly

on:
  schedule:
    # Top of every hour
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: pipeline-hourly
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      # No hourly jobs yet. Slice 3 pivoted from hourly AIS snapshots to
      # annual GPHA stats (scheduled monthly). This file stays for future
      # live-cadence sources (e.g. satellite-AIS, real-time weather).
      - run: echo "no hourly jobs registered yet"
